<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乖寶寶集點大冒險</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #F2BEC8; --pink-dark: #D4849A; --pink-deep: #9B5068;
    --blue: #BFD0F5; --blue-dark: #7090C8; --blue-deep: #3A62B0;
    --purple: #D4C5E8; --purple-dark: #9A80B8; --purple-deep: #6A4A90;
    --peach: #F5D5C8; --peach-dark: #D08060; --peach-deep: #9A5038;
    --mint: #C8E8D8; --mint-dark: #6AAA88; --mint-deep: #2A6A48;
    --cream: #FAF7F2; --text: #5A4A5A; --text-light: #9A8AA0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(160deg, #FDF0F3 0%, #F0F4FD 50%, #F4F0FA 100%);
    color: var(--text);
  }
  .deco { position: absolute; color: var(--text-light); pointer-events: none; }
  .login-logo { font-size: 60px; margin-bottom: 8px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .login-title { font-size: 34px; font-weight: 900; color: var(--pink-dark); text-align: center; line-height: 1.1; }
  .login-title2 { font-size: 34px; font-weight: 900; color: var(--purple-deep); text-align: center; margin-bottom: 4px; }
  .login-sub { font-size: 14px; color: var(--text-light); text-align: center; margin-bottom: 32px; font-weight: 700; }
  .login-box { width: 100%; max-width: 360px; }
  .user-select { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .user-btn {
    background: white; border: 2px solid var(--pink); border-radius: 18px;
    padding: 16px 8px; text-align: center; cursor: pointer;
    transition: all 0.2s; font-family: 'Nunito', sans-serif;
  }
  .user-btn:hover { border-color: var(--pink-dark); background: #FDF5F7; transform: translateY(-2px); }
  .user-btn.selected { border-color: var(--pink-dark); background: #FDF0F3; transform: translateY(-2px); }
  .user-btn .avatar { font-size: 32px; margin-bottom: 6px; }
  .user-btn .uname { font-size: 12px; font-weight: 700; color: var(--pink-deep); }
  .pw-input {
    width: 100%; background: white; border: 2px solid var(--pink);
    border-radius: 14px; padding: 14px 18px; font-family: 'Nunito', sans-serif;
    font-size: 16px; color: var(--text); margin-bottom: 12px;
    outline: none; transition: border-color 0.2s;
  }
  .pw-input:focus { border-color: var(--pink-dark); }
  .error-msg { font-size: 13px; color: var(--pink-dark); text-align: center; margin-bottom: 10px; min-height: 20px; font-weight: 700; }
  .login-btn {
    display: block; width: 100%; background: var(--pink-dark); color: white;
    border: none; border-radius: 50px; padding: 15px; font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 900; cursor: pointer; transition: all 0.2s;
  }
  .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .login-btn:active { transform: scale(0.97); }
  .deco-dots { display: flex; justify-content: center; gap: 8px; margin-top: 24px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: #4A3A4A; color: white; border-radius: 20px; padding: 12px 24px;
    font-size: 14px; font-weight: 700; z-index: 999;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<span class="deco" style="top:24px;left:30px;font-size:26px;opacity:0.25">✦</span>
<span class="deco" style="top:70px;right:24px;font-size:18px;opacity:0.2">♡</span>
<span class="deco" style="bottom:50px;left:24px;font-size:22px;opacity:0.2">✦</span>
<span class="deco" style="bottom:90px;right:40px;font-size:15px;opacity:0.25">♡</span>
<span class="deco" style="top:40%;left:14px;font-size:14px;opacity:0.15">✦</span>
<span class="deco" style="top:35%;right:14px;font-size:14px;opacity:0.15">♡</span>

<div class="login-logo">🌟</div>
<div class="login-title">乖寶寶集點</div>
<div class="login-title2">大冒險！</div>
<div class="login-sub">✦ 選擇你的角色，輸入密碼 ✦</div>

<div class="login-box">
  <div class="user-select">
    <div class="user-btn" onclick="selectUser('child1')" id="btn-child1">
      <div class="avatar">🐰</div>
      <div class="uname">小花</div>
    </div>
    <div class="user-btn" onclick="selectUser('child2')" id="btn-child2">
      <div class="avatar">🐻</div>
      <div class="uname">小明</div>
    </div>
    <div class="user-btn" onclick="selectUser('admin')" id="btn-admin">
      <div class="avatar">👑</div>
      <div class="uname">審核者</div>
    </div>
  </div>
  <input class="pw-input" type="password" id="pwInput" placeholder="🔒 輸入你的密碼..." autocomplete="off">
  <div class="error-msg" id="errorMsg"></div>
  <button class="login-btn" onclick="doLogin()">進入我的世界 ✦</button>
  <div class="deco-dots">
    <div class="dot" style="background:var(--pink)"></div>
    <div class="dot" style="background:var(--blue)"></div>
    <div class="dot" style="background:var(--purple)"></div>
    <div class="dot" style="background:var(--peach)"></div>
    <div class="dot" style="background:var(--mint)"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  // ======== 密碼設定 ========
  const PASSWORDS = {
    child1: "rabbit123",
    child2: "bear456",
    admin:  "admin888"
  };

  let selectedUser = null;

  function selectUser(user) {
    selectedUser = user;
    document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('btn-' + user).classList.add('selected');
    document.getElementById('pwInput').focus();
    document.getElementById('errorMsg').textContent = '';
  }

  function doLogin() {
    if (!selectedUser) {
      showError('請先選擇角色！'); return;
    }
    const pw = document.getElementById('pwInput').value;
    if (!pw) {
      showError('請輸入密碼！'); return;
    }
    if (pw !== PASSWORDS[selectedUser]) {
      showError('密碼不對喔，再試試看！♡'); return;
    }
    if (selectedUser === 'admin') {
      window.location.href = 'admin.html';
    } else if (selectedUser === 'child1') {
      window.location.href = 'child1.html';
    } else {
      window.location.href = 'child2.html';
    }
  }

  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
